<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio – Wong Wing Yin</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            beige: {
              50:  '#FFFDF9',
              100: '#FAF7F2',
              200: '#F2EAE0',
              300: '#E5D8CC',
              400: '#D4C4B4',
            },
            brand: {
              warm: '#C4916A',
              cool: '#A87BA0',
            }
          }
        }
      }
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    * { box-sizing: border-box; }
    .gradient-text {
      background: linear-gradient(135deg, #C4916A, #A87BA0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card-hover {
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }
    .nav-link {
      position: relative;
      transition: color 0.2s;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(135deg, #C4916A, #A87BA0);
      transition: width 0.3s ease;
    }
    .nav-link:hover::after { width: 100%; }
    .tech-badge {
      transition: transform 0.2s, background-color 0.2s;
    }
    .tech-badge:hover { transform: scale(1.05); }
    .btn-primary {
      transition: all 0.2s ease;
    }
    .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .hero-bg {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 30%, #1e3a5f 70%, #0f172a 100%);
    }
    .hero-bg-light {
      background: linear-gradient(135deg, #FAF7F2 0%, #F2EAE0 50%, #EDE0F0 100%);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up { animation: fadeInUp 0.7s ease forwards; }
    .fade-in-up-delay-1 { animation: fadeInUp 0.7s ease 0.1s forwards; opacity: 0; }
    .fade-in-up-delay-2 { animation: fadeInUp 0.7s ease 0.2s forwards; opacity: 0; }
    .fade-in-up-delay-3 { animation: fadeInUp 0.7s ease 0.3s forwards; opacity: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── DATA ──────────────────────────────────────────────────────────────────
    const projects = [
      {
        id: 1,
        emoji: "🔐",
        color: "from-amber-300 to-yellow-200",
        title: "Privacy Gateway on Microsoft Azure",
        description: [
          "Deployed an OpenVPN server on an Azure VM to establish encrypted tunnels and mask client IPs.",
          "Integrated a Pi-hole DNS sinkhole with a ~180,000-domain blocklist to block ads and minimize latency.",
          "Validated IP masking and ad-blocking effectiveness through end-to-end testing with third-party tools.",
        ],
        technologies: ["Azure VM", "OpenVPN", "Pi-hole", "DNS", "Linux"],
        image: null,         // Add: '/images/privacy-gateway.jpg'
        video: null,         // Add: 'https://www.youtube.com/embed/VIDEO_ID' or '/videos/demo.mp4'
        videoType: "youtube",// 'youtube' | 'local'
        liveLink: null,      // Add live URL
        githubLink: null,    // Add GitHub URL
      },
      {
        id: 2,
        emoji: "🏫",
        color: "from-purple-300 to-violet-200",
        title: "Full-Stack School Decision-Support Tool",
        description: [
          "Built a Vue.js and Node.js platform integrating government APIs for real-time school data comparison.",
          "Implemented Auth0 Headless Authentication (ROPC) to secure APIs with JWTs and retain custom UI.",
          "Engineered a dual-write mechanism via Express.js to sync MongoDB as the single Source of Truth.",
        ],
        technologies: ["Vue.js", "Node.js", "Express", "Auth0", "MongoDB"],
        image: null,
        video: null,
        videoType: "local",
        liveLink: null,
        githubLink: null,
      },
      {
        id: 3,
        emoji: "🎨",
        color: "from-rose-300 to-pink-200",
        title: "Real-Time Synchronized Painting App",
        description: [
          "Engineered a backend server to convert a single-player app into a real-time multiplayer canvas.",
          "Utilized Java Sockets to efficiently handle concurrent client connections and data synchronization.",
          "Led server-side development and system integration to ensure timely project completion.",
        ],
        technologies: ["Java", "Sockets", "Multithreading", "Real-time Sync"],
        image: null,
        video: null,
        videoType: "local",
        liveLink: null,
        githubLink: null,
      },
    ];

    // ─── COMPONENTS ─────────────────────────────────────────────────────────────

    function MoonIcon() {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      );
    }

    function SunIcon() {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 110 14A7 7 0 0112 5z" />
        </svg>
      );
    }

    function ExternalLinkIcon() {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 inline ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
        </svg>
      );
    }

    function Header({ dark, onToggle }) {
      const [menuOpen, setMenuOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', onScroll);
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const base = dark
        ? `bg-gray-900/95 border-gray-700/60 ${scrolled ? 'shadow-lg shadow-black/30' : ''}`
        : `bg-beige-100/95 border-beige-300/60 ${scrolled ? 'shadow-lg shadow-beige-300/80' : ''}`;

      return (
        <header className={`sticky top-0 z-50 border-b backdrop-blur-sm transition-all duration-300 ${base}`}>
          <nav className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            {/* Logo */}
            <a href="#" className="flex items-center gap-2 group">
              <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-[#C4916A] to-[#A87BA0] flex items-center justify-center text-white font-bold text-sm">
                WY
              </div>
              <span className="text-xl font-bold gradient-text">Wong Wing Yin</span>
            </a>

            {/* Desktop Nav */}
            <div className="hidden md:flex items-center gap-8">
              {['Projects', 'Contact'].map(item => (
                <a
                  key={item}
                  href={`#${item.toLowerCase()}`}
                  className={`nav-link font-medium text-sm ${dark ? 'text-gray-300 hover:text-white' : 'text-stone-500 hover:text-stone-800'}`}
                >
                  {item}
                </a>
              ))}
              <a
                href="#"
                className={`text-sm font-medium px-4 py-1.5 rounded-full border transition-all ${
                  dark
                    ? 'border-gray-600 text-gray-300 hover:border-blue-400 hover:text-blue-400'
                    : 'border-beige-300 text-stone-500 hover:border-[#C4916A] hover:text-[#C4916A]'
                }`}
              >
                Resume
              </a>
              <button
                onClick={onToggle}
                className={`p-2 rounded-lg transition-all ${dark ? 'bg-gray-800 text-yellow-400 hover:bg-gray-700' : 'bg-beige-200 text-stone-600 hover:bg-beige-300'}`}
                aria-label="Toggle theme"
              >
                {dark ? <SunIcon /> : <MoonIcon />}
              </button>
            </div>

            {/* Mobile */}
            <div className="md:hidden flex items-center gap-3">
              <button onClick={onToggle} className={`p-2 rounded-lg ${dark ? 'bg-gray-800 text-yellow-400' : 'bg-beige-200 text-stone-600'}`}>
                {dark ? <SunIcon /> : <MoonIcon />}
              </button>
              <button
                onClick={() => setMenuOpen(!menuOpen)}
                className={`p-2 rounded-lg ${dark ? 'bg-gray-800 text-gray-200' : 'bg-beige-200 text-stone-600'}`}
              >
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                    d={menuOpen ? 'M6 18L18 6M6 6l12 12' : 'M4 6h16M4 12h16M4 18h16'} />
                </svg>
              </button>
            </div>
          </nav>

          {/* Mobile Dropdown */}
          {menuOpen && (
            <div className={`md:hidden border-t px-4 py-4 flex flex-col gap-4 ${dark ? 'bg-gray-900 border-gray-700' : 'bg-beige-100 border-beige-300'}`}>
              {['Projects', 'Contact'].map(item => (
                <a
                  key={item}
                  href={`#${item.toLowerCase()}`}
                  onClick={() => setMenuOpen(false)}
                  className={`font-medium ${dark ? 'text-gray-300' : 'text-gray-700'}`}
                >
                  {item}
                </a>
              ))}
              <a href="#" className={`font-medium ${dark ? 'text-gray-300' : 'text-gray-700'}`}>Resume</a>
            </div>
          )}
        </header>
      );
    }

    function Hero({ dark }) {
      const bg = dark ? 'hero-bg' : 'hero-bg-light';
      const textSub = dark ? 'text-blue-200' : 'text-[#8B6B4A]';
      const textBody = dark ? 'text-gray-300' : 'text-stone-500';
      const pillBg = dark ? 'bg-white/10 text-blue-300 border border-white/10' : 'bg-[#F5EDE0] text-[#8B6B4A] border border-[#E8D8C0]';

      return (
        <section className={`${bg} py-24 sm:py-32 px-4`}>
          <div className="max-w-4xl mx-auto text-center">
            <div className={`inline-block text-xs font-semibold tracking-widest uppercase px-4 py-1.5 rounded-full mb-6 fade-in-up ${pillBg}`}>
              Available for opportunities
            </div>
            <h1 className={`text-5xl sm:text-7xl font-extrabold mb-6 leading-tight fade-in-up-delay-1 ${dark ? 'text-white' : 'text-[#3C3028]'}`}>
              Hi, I'm{' '}
              <span className="gradient-text">Wong Wing Yin</span>
            </h1>
            <p className={`text-lg sm:text-xl mb-8 max-w-2xl mx-auto fade-in-up-delay-2 ${textBody}`}>
              A software developer passionate about building scalable systems, cloud infrastructure,
              and real-time applications. I turn complex problems into elegant solutions.
            </p>
            <div className="flex flex-col sm:flex-row justify-center gap-4 fade-in-up-delay-3">
              <a
                href="#projects"
                className="btn-primary px-8 py-3 rounded-xl font-semibold text-white bg-gradient-to-r from-[#C4916A] to-[#A87BA0] shadow-lg shadow-[#C4916A]/30"
              >
                View My Work
              </a>
              <a
                href="#contact"
                className={`btn-primary px-8 py-3 rounded-xl font-semibold border-2 transition-colors ${
                  dark ? 'border-gray-600 text-gray-200 hover:border-blue-400 hover:text-blue-400' : 'border-beige-300 text-stone-600 hover:border-[#C4916A] hover:text-[#C4916A]'
                }`}
              >
                Get In Touch
              </a>
            </div>

            {/* Stats */}
            <div className={`mt-16 grid grid-cols-3 gap-8 max-w-sm mx-auto fade-in-up ${dark ? 'text-gray-400' : 'text-stone-400'}`}>
              {[['3+', 'Projects'], ['5+', 'Technologies'], ['100%', 'Dedication']].map(([num, label]) => (
                <div key={label} className="text-center">
                  <div className={`text-2xl font-bold gradient-text`}>{num}</div>
                  <div className="text-xs mt-1">{label}</div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function ProjectCard({ project, dark, index }) {
      const cardBg = dark ? 'bg-gray-800 border-gray-700/60 hover:border-blue-500/50' : 'bg-beige-50 border-beige-300 hover:border-[#C4916A]/60';
      const descColor = dark ? 'text-gray-300' : 'text-stone-500';
      const badgeBg = dark ? 'bg-gray-700/80 text-blue-300' : 'bg-[#F5EDE0] text-[#8B5E3C]';
      const labelColor = dark ? 'text-gray-500' : 'text-stone-400';

      return (
        <div className={`card-hover border rounded-2xl overflow-hidden ${cardBg}`} style={{ animationDelay: `${index * 0.1}s` }}>
          {/* Thumbnail */}
          <div className={`relative h-52 bg-gradient-to-br ${project.color} overflow-hidden`}>
            {project.image ? (
              <img src={project.image} alt={project.title} className="w-full h-full object-cover" />
            ) : (
              <div className="w-full h-full flex flex-col items-center justify-center text-white">
                <div className="text-6xl mb-3">{project.emoji}</div>
                <div className="text-sm font-medium opacity-80">Project Preview</div>
              </div>
            )}
            <div className="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent" />
          </div>

          {/* Body */}
          <div className="p-6">
            <h3 className={`text-xl font-bold mb-3 leading-tight ${dark ? 'text-white' : 'text-[#3C3028]'}`}>
              {project.title}
            </h3>

            <ul className={`text-sm space-y-1.5 mb-5 ${descColor}`}>
              {project.description.map((line, i) => (
                <li key={i} className="flex gap-2">
                  <span className={`${dark ? 'text-blue-400' : 'text-[#C4916A]'} mt-0.5 flex-shrink-0`}>▸</span>
                  <span>{line}</span>
                </li>
              ))}
            </ul>

            {/* Tech stack */}
            <div className="mb-5">
              <p className={`text-xs font-semibold uppercase tracking-wider mb-2 ${labelColor}`}>Stack</p>
              <div className="flex flex-wrap gap-1.5">
                {project.technologies.map(tech => (
                  <span key={tech} className={`tech-badge text-xs px-2.5 py-1 rounded-full font-medium ${badgeBg}`}>
                    {tech}
                  </span>
                ))}
              </div>
            </div>

            {/* Video embed */}
            {project.video && (
              <div className="mb-5">
                <p className={`text-xs font-semibold uppercase tracking-wider mb-2 ${labelColor}`}>Demo</p>
                {project.videoType === 'youtube' ? (
                  <iframe
                    width="100%"
                    height="180"
                    src={project.video}
                    title={project.title + ' demo'}
                    frameBorder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowFullScreen
                    className="rounded-xl"
                  />
                ) : (
                  <video controls className="w-full rounded-xl bg-black" height="180">
                    <source src={project.video} type="video/mp4" />
                  </video>
                )}
              </div>
            )}

            {/* CTA Buttons */}
            <div className={`flex gap-3 pt-4 border-t ${dark ? 'border-gray-700' : 'border-beige-300'}`}>
              {project.liveLink ? (
                <a
                  href={project.liveLink}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="btn-primary flex-1 text-center py-2.5 px-4 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-[#C4916A] to-[#A87BA0] shadow shadow-[#C4916A]/20"
                >
                  Live Demo <ExternalLinkIcon />
                </a>
              ) : (
                <span className={`flex-1 text-center py-2.5 px-4 rounded-xl text-sm font-medium border-2 border-dashed ${dark ? 'border-gray-700 text-gray-600' : 'border-beige-300 text-stone-400'}`}>
                  Link Coming Soon
                </span>
              )}
              {project.githubLink && (
                <a
                  href={project.githubLink}
                  target="_blank"
                  rel="noopener noreferrer"
                  className={`px-4 py-2.5 rounded-xl text-sm font-semibold transition-all ${dark ? 'bg-gray-700 hover:bg-gray-600 text-gray-200' : 'bg-beige-200 hover:bg-beige-300 text-stone-700'}`}
                >
                  GitHub
                </a>
              )}
            </div>
          </div>
        </div>
      );
    }

    function Projects({ dark }) {
      const sectionBg = dark ? 'bg-gray-900' : 'bg-beige-200';
      const headingColor = dark ? 'text-white' : 'text-[#3C3028]';
      const subColor = dark ? 'text-gray-400' : 'text-stone-500';

      return (
        <section id="projects" className={`${sectionBg} py-20 sm:py-28 px-4`}>
          <div className="max-w-6xl mx-auto">
            <div className="text-center mb-16">
              <p className={`text-sm font-semibold uppercase tracking-widest mb-3 gradient-text`}>Portfolio</p>
              <h2 className={`text-4xl sm:text-5xl font-extrabold mb-4 ${headingColor}`}>Featured Projects</h2>
              <p className={`text-lg max-w-2xl mx-auto ${subColor}`}>
                A selection of work spanning cloud infrastructure, full-stack development, and real-time systems.
              </p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
              {projects.map((p, i) => (
                <ProjectCard key={p.id} project={p} dark={dark} index={i} />
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Contact({ dark }) {
      const sectionBg = dark ? 'bg-gray-800' : 'bg-beige-100';
      const cardBg = dark ? 'bg-gray-900/60 border-gray-700' : 'bg-beige-200/60 border-beige-300';
      const headingColor = dark ? 'text-white' : 'text-[#3C3028]';
      const bodyColor = dark ? 'text-gray-400' : 'text-stone-500';
      const linkColor = dark ? 'text-blue-400 hover:text-blue-300' : 'text-[#A87BA0] hover:text-[#C4916A]';

      const contacts = [
        { icon: '✉️', label: 'Email', value: 'your.email@example.com', href: 'mailto:your.email@example.com' },
        { icon: '💼', label: 'LinkedIn', value: 'linkedin.com/in/yourprofile', href: 'https://linkedin.com' },
        { icon: '💻', label: 'GitHub', value: 'github.com/yourprofile', href: 'https://github.com' },
      ];

      return (
        <section id="contact" className={`${sectionBg} py-20 sm:py-28 px-4`}>
          <div className="max-w-4xl mx-auto">
            <div className="text-center mb-14">
              <p className="text-sm font-semibold uppercase tracking-widest mb-3 gradient-text">Say Hello</p>
              <h2 className={`text-4xl sm:text-5xl font-extrabold mb-4 ${headingColor}`}>Get In Touch</h2>
              <p className={`text-lg max-w-xl mx-auto ${bodyColor}`}>
                I'm open to new opportunities, collaborations, or just a friendly chat. My inbox is always open!
              </p>
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-12">
              {contacts.map(({ icon, label, value, href }) => (
                <a
                  key={label}
                  href={href}
                  target="_blank"
                  rel="noopener noreferrer"
                  className={`card-hover border rounded-2xl p-6 text-center block ${cardBg}`}
                >
                  <div className="text-4xl mb-3">{icon}</div>
                  <p className={`text-xs font-semibold uppercase tracking-wider mb-1 ${bodyColor}`}>{label}</p>
                  <p className={`text-sm font-medium ${linkColor}`}>{value}</p>
                </a>
              ))}
            </div>

            <div className="text-center">
              <a
                href="mailto:your.email@example.com"
                className="btn-primary inline-block px-10 py-4 rounded-2xl font-bold text-white bg-gradient-to-r from-[#C4916A] to-[#A87BA0] shadow-xl shadow-[#C4916A]/30 text-lg"
              >
                Send Me an Email ✉️
              </a>
            </div>
          </div>
        </section>
      );
    }

    function Footer({ dark }) {
      const bg = dark ? 'bg-gray-900 border-gray-800' : 'bg-beige-200 border-beige-300';
      const textColor = dark ? 'text-gray-500' : 'text-stone-400';
      const year = new Date().getFullYear();

      return (
        <footer className={`border-t py-10 px-4 ${bg}`}>
          <div className="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div className="flex items-center gap-2">
              <div className="w-6 h-6 rounded bg-gradient-to-br from-[#C4916A] to-[#A87BA0] flex items-center justify-center text-white font-bold text-xs">
                WY
              </div>
              <span className={`text-sm ${textColor}`}>© {year} Wong Wing Yin. All rights reserved.</span>
            </div>
            <div className={`flex items-center gap-2 text-sm ${textColor}`}>
              <span>Built with</span>
              <span className="gradient-text font-semibold">React</span>
              <span>&</span>
              <span className="gradient-text font-semibold">Tailwind CSS</span>
            </div>
          </div>
        </footer>
      );
    }

    // ─── APP ────────────────────────────────────────────────────────────────────

    function App() {
      const [dark, setDark] = useState(false);

      return (
        <div className={`${dark ? 'bg-gray-900' : 'bg-beige-100'} min-h-screen transition-colors duration-300`}>
          <Header dark={dark} onToggle={() => setDark(!dark)} />
          <Hero dark={dark} />
          <Projects dark={dark} />
          <Contact dark={dark} />
          <Footer dark={dark} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
